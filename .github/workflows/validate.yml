name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI_NODE_VERSION: 25

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

  a11y:
    name: Accessibility
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: shortbox
          POSTGRES_USER: shortbox
          POSTGRES_PASSWORD: shortbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shortbox -d shortbox"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://shortbox:shortbox@127.0.0.1:5432/shortbox?schema=shortbox

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-a11y-${{ hashFiles('package-lock.json', 'tsconfig*.json', 'next.config.*', 'app/**/*.{ts,tsx,js,jsx}', 'src/**/*.{ts,tsx,js,jsx}', 'scripts/**/*.{js,mjs,ts}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-a11y-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-a11y-

      - name: Install dependencies
        run: npm ci

      - name: Sync Prisma schema
        run: npx prisma db push

      - name: Seed CI fixtures
        run: node scripts/seed-ci-fixtures.mjs

      - name: Build app
        run: npm run build

      - name: Run pa11y audit
        run: npm run test:a11y:pa11y
        env:
          AUDIT_LIMIT: 5
          PA11Y_WAIT_MS: 3000

  seo:
    name: SEO Smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: shortbox
          POSTGRES_USER: shortbox
          POSTGRES_PASSWORD: shortbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shortbox -d shortbox"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://shortbox:shortbox@127.0.0.1:5432/shortbox?schema=shortbox

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-seo-${{ hashFiles('package-lock.json', 'tsconfig*.json', 'next.config.*', 'app/**/*.{ts,tsx,js,jsx}', 'src/**/*.{ts,tsx,js,jsx}', 'scripts/**/*.{js,mjs,ts}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-seo-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-seo-

      - name: Install dependencies
        run: npm ci

      - name: Sync Prisma schema
        run: npx prisma db push

      - name: Seed CI fixtures
        run: node scripts/seed-ci-fixtures.mjs

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start > /tmp/shortbox-start.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/robots.txt > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready in time."
          exit 1

      - name: Run SEO smoke test
        env:
          BASE_URL: http://127.0.0.1:3000
        run: npm run test:seo:smoke

      - name: Run sitemap smoke
        env:
          BASE_URL: http://127.0.0.1:3000
          SITEMAP_LIMIT: 25
        run: npm run test:seo:sitemap

      - name: Upload app startup log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: seo-startup-log
          path: /tmp/shortbox-start.log
          if-no-files-found: ignore
