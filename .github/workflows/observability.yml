name: Observability

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: observability-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_NODE_VERSION: 25

jobs:
  lighthouse:
    name: Unlighthouse (${{ matrix.device }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: shortbox
          POSTGRES_USER: shortbox
          POSTGRES_PASSWORD: shortbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shortbox -d shortbox"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    strategy:
      fail-fast: false
      matrix:
        device:
          - desktop
          - mobile
    env:
      DATABASE_URL: postgresql://shortbox:shortbox@127.0.0.1:5432/shortbox?schema=shortbox

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-observability-${{ matrix.device }}-${{ hashFiles('package-lock.json', 'tsconfig*.json', 'next.config.*', 'app/**/*.{ts,tsx,js,jsx}', 'src/**/*.{ts,tsx,js,jsx}', 'scripts/**/*.{js,mjs,ts}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-observability-${{ matrix.device }}-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-observability-${{ matrix.device }}-

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Sync Prisma schema
        id: prisma
        if: ${{ steps.install.outcome == 'success' }}
        continue-on-error: true
        run: npx prisma db push

      - name: Seed CI fixtures
        id: seed
        if: ${{ steps.prisma.outcome == 'success' }}
        continue-on-error: true
        run: node scripts/seed-ci-fixtures.mjs

      - name: Build app
        id: build
        if: ${{ steps.seed.outcome == 'success' }}
        continue-on-error: true
        run: npm run build

      - name: Run Unlighthouse audit
        id: audit
        if: ${{ steps.build.outcome == 'success' }}
        continue-on-error: true
        env:
          AUDIT_LIMIT: 3
          AUDIT_DEVICE: ${{ matrix.device }}
          UNLIGHTHOUSE_OUTPUT_PATH: .unlighthouse
        run: npm run test:seo:unlighthouse

      - name: Upload Unlighthouse report
        if: ${{ always() && steps.audit.outcome == 'success' }}
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: unlighthouse-report-${{ matrix.device }}
          path: .unlighthouse/ci-result.json
          if-no-files-found: ignore

      - name: Summarize policy
        if: always()
        run: |
          {
            echo "## Unlighthouse policy"
            echo
            echo "- This workflow is intentionally non-blocking."
            echo "- Use it for trend visibility on main, not as a strict merge gate."
            echo "- Blocking PR protection lives in the Validate workflow."
            echo
            echo "## Step outcomes"
            echo
            echo "- install: ${{ steps.install.outcome }}"
            echo "- prisma: ${{ steps.prisma.outcome || 'skipped' }}"
            echo "- seed: ${{ steps.seed.outcome || 'skipped' }}"
            echo "- build: ${{ steps.build.outcome || 'skipped' }}"
            echo "- audit: ${{ steps.audit.outcome || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
