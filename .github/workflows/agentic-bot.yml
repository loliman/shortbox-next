name: Agentic Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Ignore bot-authored comment/review events, but keep issue-open flows active.
    if: github.event_name == 'issues' || github.event.sender.type != 'Bot'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --registry https://registry.npmjs.org

      # Self-referencing: this repo IS the action.
      # External repos replace ./ with loliman/agentic-shortbox@v6.5.0
      - name: Run AI Bot
        uses: ./
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_SANDBOX_MODE: danger-full-access
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
