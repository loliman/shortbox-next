name: AI Developer Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  ai-bot:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event.sender.type != 'Bot'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - run: npm ci

      - uses: loliman/agentic-shortbox@v6.5.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEX_SANDBOX_MODE: danger-full-access
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
