version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 8
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
          - "notistack"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
          - "pg"
      testing-and-types:
        patterns:
          - "typescript"
          - "@types/*"
          - "jest"
          - "ts-jest"
          - "@testing-library/*"
          - "pa11y"
          - "unlighthouse"
      tooling:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "tsx"
          - "dotenv"
          - "graphql"
          - "undici"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-dom"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    labels:
      - "dependencies"
      - "github_actions"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
